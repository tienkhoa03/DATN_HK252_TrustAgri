version: '3.9'

services:
  # ─── INFLUXDB (Database duy nhất giữ lại vì Railway chưa có plugin sẵn) ───
  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    # XÓA block 'volumes' và 'ports' ở đây. Ta sẽ cấu hình Volume trên UI của Railway.

  # ─── MICROSERVICES (Tinh gọn lại) ─────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    # XÓA depends_on và ports.
    
  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile

  farm-service:
    build:
      context: .
      dockerfile: apps/farm-service/Dockerfile

  contract-service:
    build:
      context: .
      dockerfile: apps/contract-service/Dockerfile

  monitoring-service:
    build:
      context: .
      dockerfile: apps/monitoring-service/Dockerfile

  # ─── API GATEWAY ──────────────────────────────────────────────────────────
  api-gateway:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro