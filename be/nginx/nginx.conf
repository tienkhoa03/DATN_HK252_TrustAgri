worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ─── LOGGING ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'req_id="$request_id"';
    access_log /var/log/nginx/access.log main;

    # ─── UPSTREAM SERVICES ────────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:3001;
        keepalive 16;
    }

    upstream notification_service {
        server notification-service:3002;
        keepalive 16;
    }

    upstream farm_service {
        server farm-service:3003;
        keepalive 16;
    }

    upstream contract_service {
        server contract-service:3004;
        keepalive 16;
    }

    upstream monitoring_service {
        server monitoring-service:3005;
        keepalive 16;
    }

    # Trả 429 khi vượt rate limit (map với ErrorResponse code RATE_LIMIT_EXCEEDED ở tầng ứng dụng nếu có)
    limit_req_status 429;

    # ─── RATE LIMITING ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=600r/m;
    limit_req_zone $binary_remote_addr zone=api_public:10m  rate=600r/m;
    limit_req_zone $binary_remote_addr zone=api_traceability:10m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=600r/m;

    server {
        listen 80;
        server_name _;

        # Attach correlation ID to every request
        add_header X-Request-Id $request_id always;

        # ─── PROXY COMMON SETTINGS ──────────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id      $request_id;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;

        # ─── AUTH SERVICE ───────────────────────────────────────────────────
        location /api/v1/auth {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://auth_service;
        }

        # ─── FARM SERVICE ───────────────────────────────────────────────────
        location /api/v1/farms {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://farm_service;
        }

        location /api/v1/standards {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://farm_service;
        }

        location /api/v1/traceability {
            limit_req zone=api_traceability burst=8 nodelay;
            proxy_pass http://farm_service;
        }

        # ─── CONTRACT SERVICE ───────────────────────────────────────────────
        location /api/v1/products {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/buying-requests {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/orders {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/proposals {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/contracts {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/connections {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/traders {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/farmers {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://contract_service;
        }

        location /api/v1/dashboard {
            limit_req zone=api_general burst=10 nodelay;
            proxy_pass http://contract_service;
        }

        # ─── MONITORING SERVICE ─────────────────────────────────────────────
        location /api/v1/monitoring {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://monitoring_service;
        }

        # WebSocket upgrade for /ws/monitoring
        location /ws/monitoring {
            proxy_pass http://monitoring_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 3600s;
        }

        # ─── NOTIFICATION SERVICE ───────────────────────────────────────────
        location /api/v1/notifications {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://notification_service;
        }

        location /api/v1/news {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://notification_service;
        }

        location /api/v1/forecasts {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://notification_service;
        }

        # ─── HEALTH CHECK ───────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
        }

        # ─── FALLBACK ───────────────────────────────────────────────────────
        location / {
            return 404 '{"error":{"code":"NOT_FOUND","message":"Endpoint không tồn tại"}}';
        }
    }
}
